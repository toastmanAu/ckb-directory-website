name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject cache-busting query strings
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          sed -i 's|css/style.css[^"]*|css/style.css?v='"${SHORT_SHA}"'|g' index.html
          sed -i 's|js/app.js[^"]*|js/app.js?v='"${SHORT_SHA}"'|g' index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=ckb-directory --branch=main
